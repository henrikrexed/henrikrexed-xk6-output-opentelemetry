name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  GOTOOLCHAIN: auto

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Install xk6
        run: go install go.k6.io/xk6/cmd/xk6@latest

      - name: Fetch latest k6 version
        id: k6version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          K6_VERSION=$(curl -s -H "Authorization: Bearer $GH_TOKEN" https://api.github.com/repos/grafana/k6/releases/latest | jq -r '.tag_name')
          if [ "$K6_VERSION" = "null" ] || [ -z "$K6_VERSION" ]; then
            echo "::warning::Could not fetch latest k6 version, building with latest"
            K6_VERSION=""
          fi
          echo "version=$K6_VERSION" >> "$GITHUB_OUTPUT"
          echo "Building with k6 ${K6_VERSION:-latest}"

      - name: Build k6 with extension
        run: xk6 build ${{ steps.k6version.outputs.version }} --with github.com/henrikrexed/henrikrexed-xk6-output-opentelemetry=.

      - name: Verify binary
        run: ./k6 version

      - name: Upload k6 binary
        uses: actions/upload-artifact@v4
        with:
          name: k6-linux-amd64
          path: k6

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest

  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Run govulncheck
        continue-on-error: true
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table

